name: CI

on:
  push:
    branches: [main]
  pull_request:

# Only the latest run per ref needs to finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Lint + format + dead-code (nix), shellcheck (scripts), and the Rust
      # workspace's fmt --check / clippy -D warnings / cargo test.
      - name: Checks (cli test)
        run: nix develop --command cli test

      # Builds every package + the dev shell and validates the NixOS /
      # home-manager modules.
      - name: Flake check
        run: nix flake check --print-build-logs
